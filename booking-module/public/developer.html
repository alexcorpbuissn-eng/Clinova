<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Developer Panel - Shikoyatlar</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* Login Screen */
    #login-screen {
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1e293b;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      width: 100%;
      max-width: 350px;
    }
    .login-box h2 {
      margin-top: 0;
      color: #0f172a;
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #dc2626;
    }
    .error-msg {
      color: #ef4444;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    /* Dashboard */
    #dashboard {
      display: none;
      width: 100%;
      max-width: 1000px;
      padding: 40px 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .header h1 {
      margin: 0;
      color: #0f172a;
    }
    .logout-btn {
      padding: 8px 16px;
      background: #94a3b8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .complaint-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      margin-bottom: 20px;
      border-left: 5px solid #ef4444;
    }
    .c-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: #64748b;
    }
    .c-patient {
      font-weight: 700;
      color: #0f172a;
      font-size: 1.1rem;
    }
    .c-phone {
      color: #0369a1;
      font-weight: 600;
    }
    .c-message {
      font-size: 1rem;
      color: #334155;
      line-height: 1.6;
      background: #f8fafc;
      padding: 16px;
      border-radius: 8px;
    }
    .empty-state {
      text-align: center;
      color: #64748b;
      padding: 40px;
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-box">
      <h2>Developer Panel</h2>
      <p style="color: #64748b; font-size: 14px;">Shikoyatlarni ko'rish uchun parolni kiriting</p>
      <input type="password" id="dev-password" placeholder="Parol...">
      <button onclick="login()">Kirish</button>
      <div id="login-error" class="error-msg">Parol noto'g'ri!</div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="header">
      <h1>⚠️ Mijozlar Shikoyatlari</h1>
      <button class="logout-btn" onclick="logout()">Chiqish</button>
    </div>
    
    <div id="complaints-container">
      <div class="empty-state">Yuklanmoqda...</div>
    </div>
  </div>

  <script>
    let devPass = '';

    // Check session memory
    if (sessionStorage.getItem('devPass')) {
      devPass = sessionStorage.getItem('devPass');
      fetchComplaints();
    }

    async function login() {
      const pwd = document.getElementById('dev-password').value;
      if (!pwd) return;
      
      devPass = pwd;
      await fetchComplaints(true);
    }

    function logout() {
      sessionStorage.removeItem('devPass');
      devPass = '';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dev-password').value = '';
    }

    async function fetchComplaints(isLoginAttempt = false) {
      try {
        const res = await fetch('/api/public/complaints', {
          headers: { 'X-Dev-Password': devPass }
        });
        
        if (res.status === 403) {
          if (isLoginAttempt) {
            document.getElementById('login-error').style.display = 'block';
          } else {
            logout(); // session pass is wrong
          }
          return;
        }

        const data = await res.json();
        
        if (data.success) {
          sessionStorage.setItem('devPass', devPass);
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          renderComplaints(data.complaints);
        }
      } catch (e) {
        console.error(e);
        alert('Tarmoq xatosi.');
      }
    }

    function renderComplaints(complaints) {
      const container = document.getElementById('complaints-container');
      
      if (!complaints || complaints.length === 0) {
        container.innerHTML = '<div class="empty-state">Hozircha shikoyatlar yo\'q.</div>';
        return;
      }

      container.innerHTML = complaints.map(c => {
        const date = new Date(c.createdAt).toLocaleString('ru-RU');
        const p = c.patient || {};
        return `
          <div class="complaint-card">
            <div class="c-header">
              <div class="c-patient">${p.firstName || 'Noma\'lum'} ${p.lastName || ''} <span class="c-phone">(${p.phone || p.telegramPhone || 'Raqam yo\'q'})</span></div>
              <div>${date}</div>
            </div>
            <div class="c-message">
              ${c.message.replace(/\n/g, '<br>')}
            </div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('dev-password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
