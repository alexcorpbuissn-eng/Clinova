<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sklad va Xarajatlar | CLINOVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Atkinson+Hyperlegible+Next:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#2d6a4f",
                    "outline": "#707973",
                    "on-primary-fixed-variant": "#0e5138",
                    "tertiary-fixed": "#cee9d3",
                    "surface": "#f9faf6",
                    "surface-tint": "#2c694e",
                    "error": "#ba1a1a",
                    "on-error-container": "#93000a",
                    "surface-bright": "#f9faf6",
                    "on-primary-container": "#a8e7c5",
                    "on-tertiary-fixed": "#092012",
                    "secondary-fixed": "#a0f4c8",
                    "on-secondary": "#ffffff",
                    "surface-container-high": "#e7e9e5",
                    "outline-variant": "#bfc9c1",
                    "on-primary-fixed": "#002114",
                    "tertiary-container": "#4d6553",
                    "on-surface-variant": "#404943",
                    "on-surface": "#1a1c1a",
                    "primary-fixed": "#b1f0ce",
                    "on-secondary-container": "#19724f",
                    "secondary-fixed-dim": "#85d7ad",
                    "on-tertiary-fixed-variant": "#354c3b",
                    "on-primary": "#ffffff",
                    "primary": "#0f5238",
                    "surface-dim": "#d9dad7",
                    "secondary": "#0e6c4a",
                    "inverse-on-surface": "#f0f1ed",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e2e3df",
                    "background": "#f9faf6",
                    "error-container": "#ffdad6",
                    "tertiary": "#364d3c",
                    "on-secondary-fixed": "#002113",
                    "surface-container-low": "#f3f4f0",
                    "inverse-surface": "#2e312f",
                    "on-tertiary-container": "#c6e1ca",
                    "on-background": "#1a1c1a",
                    "surface-container-highest": "#e2e3df",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#005236",
                    "tertiary-fixed-dim": "#b3cdb7",
                    "primary-fixed-dim": "#95d4b3",
                    "surface-container": "#edeeea",
                    "inverse-primary": "#95d4b3",
                    "secondary-container": "#a0f4c8"
                },
                "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
                },
                "spacing": {
                    "margin-desktop": "32px",
                    "gutter": "24px",
                    "margin-mobile": "16px",
                    "unit": "8px",
                    "container-max": "1280px",
                    "sidebar-width": "260px"
                },
                "fontFamily": {
                    "headline-lg-mobile": ["Plus Jakarta Sans"],
                    "body-sm": ["Atkinson Hyperlegible Next"],
                    "body-md": ["Atkinson Hyperlegible Next"],
                    "headline-xl": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "body-lg": ["Atkinson Hyperlegible Next"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "label-md": ["Plus Jakarta Sans"]
                },
                "fontSize": {
                    "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],

                    "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                    "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                    "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                    "label-sm": ["12px", { "lineHeight": "14px", "fontWeight": "500" }],
                    "label-md": ["14px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }]

            }
        }
    }
</script>


<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .fill-icon {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* Simple reset for table loader from js */
    .admin-loader { text-align: center; padding: 20px; }
    .admin-skeleton-bar { background: #e2e3df; margin-bottom: 8px; border-radius: 4px; height: 16px; }
    .badge { padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .badge-scheduled { background-color: var(--color-surface-variant); color: var(--color-on-surface-variant); }
    .badge-completed { background-color: var(--color-tertiary-fixed); color: var(--color-on-tertiary-fixed); }
    .badge-cancelled-admin { background-color: var(--color-error-container); color: var(--color-on-error-container); }
    .badge-cancelled-patient { background-color: var(--color-error-container); color: var(--color-on-error-container); }
    .badge-noshow { background-color: var(--color-error-container); color: var(--color-on-error-container); }
</style>

    <style>
        /* Toast overrides for Clinova */
        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { pointer-events: auto; background: var(--color-inverse-surface); padding: 16px 20px; color: var(--color-inverse-on-surface); border-radius: 16px; transform: translateX(120%); opacity: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); display:flex; align-items:center; gap:12px; font-family: 'Atkinson Hyperlegible Next', sans-serif;}
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-left: 4px solid var(--color-primary); }
        .toast.error { border-left: 4px solid var(--color-error); }
    </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md flex antialiased selection:bg-primary-container selection:text-on-primary-container">

<div id="toast-container"></div>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="min-h-screen w-full flex flex-col items-center justify-center bg-surface-container-lowest p-6">
    <div class="bg-surface-container-lowest p-8 rounded-[24px] border border-outline-variant/30 shadow-[0_8px_32px_rgba(45,106,79,0.06)] w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="font-headline-lg text-primary flex items-center justify-center gap-3">
                <span class="material-symbols-outlined text-[32px] fill-icon">inventory_2</span>
                CLINOVA Sklad
            </h1>
            <p class="text-on-surface-variant mt-2 font-body-sm">Ta'minotchi Paneli</p>
        </div>
        
        <div id="login-err" class="text-error text-center font-medium mb-6 min-h-[24px]"></div>

        <form id="phone-form" onsubmit="event.preventDefault();" class="space-y-6">
            <div>
                <label class="block font-label-md text-on-surface-variant mb-2">Telegram raqamingiz</label>
                <input type="tel" id="telegram-phone" required placeholder="+998 90 000 00 00" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none font-body-lg hover:border-outline placeholder:text-outline-variant" />
            </div>
            <button type="submit" id="btn-phone" class="w-full bg-primary text-on-primary py-3 rounded-xl font-label-md hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-sm active:scale-[0.98]">
                Kodni Olish
            </button>
        </form>

        <form id="otp-form" style="display:none;" onsubmit="event.preventDefault();" class="space-y-6">
            <div>
                <label class="block font-label-md text-on-surface-variant mb-2">Tasdiqlash kodi</label>
                <input type="text" id="otp-code" required placeholder="123456" maxlength="6" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none font-headline-md tracking-[0.25em] text-center hover:border-outline placeholder:text-outline-variant" />
            </div>
            <button type="submit" id="btn-otp" class="w-full bg-primary text-on-primary py-3 rounded-xl font-label-md hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-sm active:scale-[0.98]">
                Kirish
            </button>
        </form>
    </div>
</div>

<!-- APP -->
<div id="app" class="min-h-screen w-full hidden flex-col">
    <!-- Topbar -->
    <header class="bg-surface-container-lowest border-b border-outline-variant/30 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                <span class="material-symbols-outlined fill-icon">inventory_2</span>
            </div>
            <h1 class="font-headline-md text-primary">Xarajatlar va Sklad Paneli</h1>
        </div>
        <button onclick="logout()" class="flex items-center gap-2 px-4 py-2 rounded-full border border-outline-variant text-on-surface hover:bg-error/10 hover:text-error hover:border-error transition-colors font-label-md">
            <span class="material-symbols-outlined text-[1.2rem]">logout</span> Chiqish
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-8 max-w-7xl mx-auto w-full grid lg:grid-cols-[400px_1fr] gap-8 items-start">
        
        <!-- Left: Add Form -->
        <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant/30 shadow-sm p-6 lg:sticky lg:top-28">
            <h2 class="font-headline-md text-on-surface mb-6 flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">add_circle</span> Yangi xarajat
            </h2>
            
            <form id="add-form" onsubmit="event.preventDefault(); submitPurchase();" class="space-y-5">
                <div>
                    <label class="block font-label-md text-on-surface-variant mb-2">Nima xarid qilindi? (Nomi) <span class="text-error">*</span></label>
                    <input type="text" id="p-item" required placeholder="Masalan: Zirconium implanti 5 dona" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none font-body-lg hover:border-outline placeholder:text-outline-variant" />
                </div>
                
                <div>
                    <label class="block font-label-md text-on-surface-variant mb-2">Sotuvchi / Yetkazib beruvchi <span class="text-error">*</span></label>
                    <input type="text" id="p-seller" required placeholder="Masalan: Ahmad Aka / DentMed LLC" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none font-body-lg hover:border-outline placeholder:text-outline-variant" />
                </div>
                
                <div>
                    <label class="block font-label-md text-on-surface-variant mb-2">Umumiy narxi <span class="text-error">*</span></label>
                    <div class="relative">
                        <input type="text" id="p-price" required placeholder="500 000" oninput="this.value = this.value.replace(/\D/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ' ')" class="w-full px-4 py-3 pr-14 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none font-body-lg hover:border-outline placeholder:text-outline-variant" />
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 font-label-md text-outline">so'm</span>
                    </div>
                </div>
                
                <button type="submit" id="btn-submit" class="w-full bg-primary text-on-primary py-3 mt-4 rounded-xl font-label-md flex items-center justify-center gap-2 hover:bg-primary-container transition-colors shadow-sm active:scale-[0.98]">
                    <span class="material-symbols-outlined">check_circle</span> Saqlash
                </button>
            </form>
        </div>

        <!-- Right: List -->
        <div>
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-headline-md text-on-surface flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">history</span> Xarajatlar tarixi
                </h2>
                <button onclick="loadPurchases()" class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container text-on-surface hover:bg-surface-container-high transition-colors font-label-md">
                    <span class="material-symbols-outlined text-[1.2rem]">refresh</span> Yangilash
                </button>
            </div>
            
            <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant/30 shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-surface-container-low text-on-surface-variant font-label-md uppercase border-b border-outline-variant/50">
                            <th class="py-4 px-6 border-r border-outline-variant/50">Sana</th>
                            <th class="py-4 px-6 border-r border-outline-variant/50">Xarid narsasi</th>
                            <th class="py-4 px-6 border-r border-outline-variant/50">Sotuvchi</th>
                            <th class="py-4 px-6 text-right">Summa</th>
                        </tr>
                    </thead>
                    <tbody id="purchases-tbody" class="divide-y divide-outline-variant/20 text-body-sm text-on-surface">
                        <tr><td colspan="4" class="py-8 text-center text-outline font-medium bg-surface-container-lowest">Yuklanmoqda...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
  let token = null;

  function showToast(msg, isError = false) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${isError ? 'error' : 'success'}`;
    const icon = isError ? 'error' : 'check_circle';
    toast.innerHTML = `<span class="material-symbols-outlined">${icon}</span> <span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 400);
    }, 3000);
  }

  // --- Auth Flow ---
  async function verifyAuth() {
    const t = localStorage.getItem('inventory_token');
    if (!t) return;
    try {
      const res = await fetch('/api/inventory/purchases', { headers: { 'Authorization': `Bearer ${t}` } });
      if (res.ok) { token = t; showApp(); }
      else localStorage.removeItem('inventory_token');
    } catch {}
  }
  
  document.getElementById('phone-form').addEventListener('submit', async () => {
    let phone = document.getElementById('telegram-phone').value;
    const errEl = document.getElementById('login-err');
    let digits = phone.replace(/\D/g, '');
    if (digits.startsWith('998') && digits.length === 12) phone = '+' + digits;
    else return errEl.textContent = "To'g'ri raqam kiriting.";

    errEl.textContent = '';
    const btn = document.getElementById('btn-phone');
    btn.disabled = true; btn.textContent = '...';
    try {
      const res = await fetch('/api/public/send-otp', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telegramPhone: phone })
      });
      const data = await res.json();
      if (res.ok && (data.success || data.action)) {
        if(data.action === 'deep_link') errEl.innerHTML = `<a href="${data.deepLink}" target="_blank" class="underline hover:text-primary">Botdan ro'yxatdan o'ting</a>`;
        else {
          document.getElementById('phone-form').style.display = 'none';
          document.getElementById('otp-form').style.display = 'block';
        }
      } else errEl.textContent = data.error || 'Xatolik';
    } catch { errEl.textContent = 'Tarmoq xatosi'; }
    btn.disabled = false; btn.textContent = 'Kodni Olish';
  });

  document.getElementById('otp-form').addEventListener('submit', async () => {
    const phone = document.getElementById('telegram-phone').value;
    const code = document.getElementById('otp-code').value;
    const errEl = document.getElementById('login-err');
    errEl.textContent = '';
    const btn = document.getElementById('btn-otp');
    btn.disabled = true; btn.textContent = '...';
    try {
      const res = await fetch('/api/public/verify-otp', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telegramPhone: phone, code })
      });
      const data = await res.json();
      if (res.ok && data.success && data.token) {
        localStorage.setItem('inventory_token', data.token);
        token = data.token;
        showApp();
      } else errEl.textContent = data.error || "Ruxsat yo'q!";
    } catch { errEl.textContent = 'Tarmoq xatosi'; }
    btn.disabled = false; btn.textContent = 'Kirish';
  });

  function logout() {
    localStorage.removeItem('inventory_token');
    token = null;
    location.reload();
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    const app = document.getElementById('app');
    app.classList.remove('hidden');
    app.classList.add('flex');
    loadPurchases();
  }

  // --- API ---
  async function submitPurchase() {
    const item = document.getElementById('p-item').value;
    const seller = document.getElementById('p-seller').value;
    const priceStr = document.getElementById('p-price').value.replace(/\D/g, '');
    
    if(!item || !seller || !priceStr) return showToast("Barcha maydonlarni to'ldiring", true);

    const btn = document.getElementById('btn-submit');
    const originalContent = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Saqlanmoqda...';

    try {
      const res = await fetch('/api/inventory/purchases', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ itemName: item, sellerName: seller, price: priceStr })
      });
      const data = await res.json();
      if(data.success) {
        showToast("Xarajat muvaffaqiyatli saqlandi!");
        document.getElementById('add-form').reset();
        loadPurchases();
      } else {
        showToast(data.error || 'Xatolik', true);
      }
    } catch { showToast('Tarmoq xatosi', true); }
    
    btn.disabled = false; btn.innerHTML = originalContent;
  }

  async function loadPurchases() {
    const tbody = document.getElementById('purchases-tbody');
    tbody.innerHTML = '<tr><td colspan="4" class="py-8 text-center text-outline font-medium bg-surface-container-lowest">Yuklanmoqda...</td></tr>';
    try {
      const res = await fetch('/api/inventory/purchases', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if(data.success) {
        if(data.purchases.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="py-8 text-center text-outline font-medium bg-surface-container-lowest"><div class="flex flex-col items-center gap-2"><span class="material-symbols-outlined text-[2rem] text-outline-variant">inventory_2</span>Hech qanday xarajat yo\'q</div></td></tr>';
          return;
        }
        tbody.innerHTML = data.purchases.map(p => `
          <tr class="hover:bg-surface-container-lowest transition-colors group">
            <td class="py-4 px-6 border-r border-outline-variant/50">${new Date(p.createdAt).toLocaleString('ru-RU')}</td>
            <td class="py-4 px-6 border-r border-outline-variant/50">
              <div class="font-semibold text-on-surface">${p.itemName}</div>
            </td>
            <td class="py-4 px-6 border-r border-outline-variant/50">${p.sellerName}</td>
            <td class="py-4 px-6 text-right">
              <span class="font-bold text-primary">${p.price.toLocaleString('ru-RU')} so'm</span>
            </td>
          </tr>
        `).join('');
      } else {
        if(res.status === 401 || res.status === 403) logout();
        tbody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-error font-medium bg-surface-container-lowest">${data.error}</td></tr>`;
      }
    } catch {
      tbody.innerHTML = '<tr><td colspan="4" class="py-8 text-center text-error font-medium bg-surface-container-lowest">Tarmoq xatosi</td></tr>';
    }
  }

  window.onload = verifyAuth;
</script>
</body>
</html>
