<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tizimga kirish | Habibullo-Hilola</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-container { max-width: 400px; margin: 80px auto; padding: 24px; background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .login-container h1 { text-align: center; color: var(--navy); font-size: 1.5rem; margin-bottom: 8px; }
    .login-container p { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
    .inline-err { background: #fff1f2; border: 1px solid #fecdd3; border-radius: 8px; padding: 11px 15px; color: #be123c; font-size: 0.85rem; margin-bottom: 14px; display: none; }
    .inline-err.on { display: block; }
    .otp-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; text-align: center; padding: 10px 0; }
    .otp-input { font-size: 2rem; letter-spacing: 0.4em; text-align: center; width: 180px; padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-family: inherit; font-weight: 700; color: var(--navy); }
    .otp-input:focus { outline: none; border-color: var(--teal); }
    .tg-link-btn { display: inline-flex; align-items: center; gap: 8px; background: #229ed9; color: #fff; font-weight: 600; font-size: 0.95rem; padding: 13px 24px; border-radius: 10px; text-decoration: none; transition: opacity 0.2s; }
    .tg-link-btn:hover { opacity: 0.88; }
  </style>
</head>
<body class="bg-light">

<header class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo" id="logo-link">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Habibullo-Hilola</span>
    </a>
  </div>
</header>

<main>
  <div class="container">
    <div class="login-container">
      <h1>Tizimga kirish</h1>
      <p>Qabulga yozilish uchun raqamingizni tasdiqlang</p>
      
      <div id="err" class="inline-err"></div>

      <!-- Step 1: Phone -->
      <form id="phone-form" class="appointment-form">
        <div class="form-group">
          <label>Telegram raqamingiz *</label>
          <input id="fTgPhone" type="tel" required placeholder="+998 90 000 00 00" />
        </div>
        <button type="submit" class="btn-submit-booking" id="btn-phone" style="width:100%">Davom etish</button>
      </form>

      <!-- Step 2: OTP -->
      <div id="otp-section" style="display:none">
        <div class="otp-wrap">
          <div id="deep-link-msg" style="display:none">
            <p style="color:var(--text-muted);font-size:.9rem">Siz yangi foydalanuvchisiz. Iltimos, Telegram botimizni ochib tasdiqlang:</p>
            <a id="tg-link" href="#" target="_blank" class="tg-link-btn">
              Telegram botini ochish
            </a>
          </div>
          <div id="direct-msg" style="display:none">
            <p style="color:var(--teal-dark);font-size:.9rem;font-weight:500">Tasdiqlash kodi Telegram'ingizga yuborildi!</p>
          </div>
          
          <p style="color:var(--text-muted);font-size:.85rem;margin-top:10px">Kodni quyiga kiriting:</p>
          <input class="otp-input" id="otp-input" type="text" inputmode="numeric" maxlength="6" placeholder="000000"/>
          <button class="btn-submit-booking" id="btn-verify" style="width:100%">Tasdiqlash</button>
          <button id="btn-resend" style="background:none;border:none;color:var(--teal-dark);cursor:pointer;font-size:.85rem;font-family:inherit;margin-top:10px">Kodni qayta yuborish</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  const API = '';
  function err(msg) { const e = document.getElementById('err'); e.textContent=msg; e.classList.add('on'); }
  function clearErr() { document.getElementById('err').classList.remove('on'); }

  // Auto-redirect if already logged in
  if (localStorage.getItem('patientId')) {
    window.location.href = 'booking.html';
  }

  document.getElementById('phone-form').addEventListener('submit', async e => {
    e.preventDefault(); clearErr();
    const tgPhone = document.getElementById('fTgPhone').value.trim();
    const btn = document.getElementById('btn-phone');
    btn.disabled=true; btn.textContent='Kutilmoqda...';

    try {
      const res = await fetch(`${API}/api/public/send-otp`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegramPhone:tgPhone})
      });
      const data = await res.json();
      
      if (res.ok) {
        document.getElementById('phone-form').style.display = 'none';
        document.getElementById('otp-section').style.display = 'block';
        
        if (data.action === 'deep_link') {
          document.getElementById('deep-link-msg').style.display = 'block';
          document.getElementById('tg-link').href = data.deepLink;
        } else if (data.action === 'enter_otp') {
          document.getElementById('direct-msg').style.display = 'block';
        }
      } else {
        err(data.error || 'Xatolik yuz berdi');
      }
    } catch(e) { err('Server xatosi'); }
    btn.disabled=false; btn.textContent='Davom etish';
  });

  document.getElementById('btn-verify').addEventListener('click', async () => {
    clearErr();
    const code = document.getElementById('otp-input').value.trim();
    const tgPhone = document.getElementById('fTgPhone').value.trim();
    if (code.length !== 6) { err('6 raqamli kodni kiriting'); return; }

    const btn = document.getElementById('btn-verify');
    btn.disabled=true; btn.textContent='Tekshirilmoqda...';

    try {
      const res = await fetch(`${API}/api/public/verify-otp`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegramPhone:tgPhone, code})
      });
      const data = await res.json();
      if (res.ok && data.success) {
        localStorage.setItem('patientId', data.patient.id);
        if (data.patient.firstName) localStorage.setItem('fFirst', data.patient.firstName);
        if (data.patient.lastName) localStorage.setItem('fLast', data.patient.lastName);
        if (data.patient.phone) localStorage.setItem('fPhone', data.patient.phone);
        
        // Check if returning to a specific page
        const returnUrl = new URLSearchParams(window.location.search).get('return') || 'booking.html';
        window.location.href = returnUrl;
      } else {
        err(data.error || 'Noto\\'g\\'ri kod.');
      }
    } catch(e) { err('Server xatosi'); }
    btn.disabled=false; btn.textContent='Tasdiqlash';
  });

  document.getElementById('btn-resend').addEventListener('click', async () => {
    const tgPhone = document.getElementById('fTgPhone').value.trim();
    await fetch(`${API}/api/public/send-otp`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegramPhone:tgPhone})
    });
    const btn = document.getElementById('btn-resend');
    btn.textContent='✓ Qayta yuborildi';
    setTimeout(() => btn.textContent='Kodni qayta yuborish', 3000);
  });
</script>
</body>
</html>
