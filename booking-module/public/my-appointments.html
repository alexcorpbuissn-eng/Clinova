<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mening Qabullarim | Habibullo-Hilola</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .dash-container { max-width: 800px; margin: 40px auto; padding: 20px; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .dash-header h1 { color: var(--navy); font-size: 1.8rem; margin: 0; }
    .btn-outline { border: 2px solid var(--border); background: transparent; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s; }
    .btn-outline:hover { background: #f8fafc; border-color: #cbd5e1; }
    .appt-list { display: flex; flex-direction: column; gap: 16px; }
    .appt-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
    .appt-info h3 { margin: 0 0 6px; font-size: 1.1rem; color: var(--navy); }
    .appt-info p { margin: 0; color: var(--text-muted); font-size: 0.9rem; }
    .appt-info p strong { color: var(--teal-dark); }
    .appt-status { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .status-active { background: #dcfce7; color: #166534; }
    .btn-cancel { background: #fee2e2; color: #991b1b; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit; transition: opacity 0.2s; }
    .btn-cancel:hover { opacity: 0.8; }
    .btn-cancel:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty-state { text-align: center; padding: 60px 20px; background: #fff; border-radius: 16px; border: 1px dashed var(--border); }
    .empty-state h3 { color: var(--navy); margin-bottom: 10px; }
    .empty-state p { color: var(--text-muted); margin-bottom: 20px; }
  </style>
</head>
<body class="bg-light">

<header class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo" id="logo-link">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Habibullo-Hilola</span>
    </a>
    <nav class="nav-links" id="nav-links">
      <a href="index.html" class="nav-link">Asosiy</a>
      <a href="services.html" class="nav-link">Xizmatlar</a>
      <a href="about.html" class="nav-link">Biz haqimizda</a>
      <a href="booking.html" class="nav-link">Qabul</a>
    </nav>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</header>

<main class="dash-container">
  <div class="dash-header">
    <h1>Mening qabullarim</h1>
    <button class="btn-outline" onclick="logout()">Chiqish</button>
  </div>

  <div id="loader" style="text-align:center;padding:40px;color:var(--text-muted)">Yuklanmoqda...</div>
  <div id="error" style="color:#be123c;background:#fff1f2;padding:12px;border-radius:8px;margin-bottom:20px;display:none"></div>
  <div id="cancel-info" style="margin-bottom: 20px; font-size: 0.95rem; color: var(--navy); display: none; background: #e0f2fe; padding: 12px; border-radius: 8px; border: 1px solid #bae6fd;"></div>
  <div id="appt-container" class="appt-list"></div>
</main>

<script>
  const API = '';
  const patientId = localStorage.getItem('patientId');
  if (!patientId) {
    window.location.href = 'login.html?return=my-appointments.html';
  }

  function logout() {
    localStorage.removeItem('patientId');
    localStorage.removeItem('fFirst');
    localStorage.removeItem('fLast');
    localStorage.removeItem('fPhone');
    window.location.href = 'index.html';
  }

  function fmtTime(utcStr) {
    return new Date(utcStr).toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Tashkent'});
  }
  function fmtDate(utcStr) {
    return new Date(utcStr).toLocaleDateString('uz-UZ',{day:'numeric',month:'long',year:'numeric',timeZone:'Asia/Tashkent'});
  }

  async function fetchAppts() {
    try {
      const res = await fetch(`${API}/api/public/appointments?patientId=${patientId}`);
      const data = await res.json();
      document.getElementById('loader').style.display = 'none';

      if (!res.ok) {
        document.getElementById('error').textContent = data.error || 'Xatolik yuz berdi';
        document.getElementById('error').style.display = 'block';
        return;
      }

      renderAppts(data.appointments, data.remainingCancellations);
    } catch (e) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('error').textContent = "Server bilan bog'lanishda xatolik";
      document.getElementById('error').style.display = 'block';
    }
  }

  let activeIntervals = [];

  function renderAppts(appts, remainingCancellations) {
    activeIntervals.forEach(clearInterval);
    activeIntervals = [];

    const c = document.getElementById('appt-container');
    const info = document.getElementById('cancel-info');
    
    if (remainingCancellations !== undefined) {
      if (remainingCancellations === 0) {
        info.innerHTML = `Siz bugungi bekor qilish limitidan (2 ta) to'liq foydalandingiz.<br><strong style="color:#be123c; display:inline-block; margin-top:6px;">Muammoni hal qilish uchun markaz bilan bog'laning: +998 90 123 45 67</strong>`;
        info.style.background = '#fff1f2';
        info.style.border = '1px solid #fecdd3';
        info.style.color = '#be123c';
      } else {
        info.innerHTML = `Sizda bugun bekor qilish uchun <strong>${remainingCancellations} ta</strong> urinish qoldi (Maksimum 2 ta).`;
        info.style.background = '#e0f2fe';
        info.style.border = '1px solid #bae6fd';
        info.style.color = 'var(--navy)';
      }
      info.style.display = 'block';
    } else {
      info.style.display = 'none';
    }

    if (!appts || appts.length === 0) {
      c.innerHTML = `
        <div class="empty-state">
          <h3>Sizda faol qabullar yo'q</h3>
          <p>Yangi qabulga yozilish uchun shifokor tanlang.</p>
          <a href="booking.html" class="btn-primary" style="display:inline-block;padding:10px 24px;border-radius:8px">Yangi qabul</a>
        </div>
      `;
      return;
    }

    c.innerHTML = '';
    appts.forEach(a => {
      const card = document.createElement('div');
      card.className = 'appt-card';
      
      const timerId = `timer-${a.id}`;
      const btnId = `btn-${a.id}`;

      card.innerHTML = `
        <div class="appt-info">
          <span class="appt-status status-active">Faol</span>
          <h3>Dr. ${a.doctor.firstName} ${a.doctor.lastName}</h3>
          <p>Protsedura: <strong>${a.procedure.name}</strong></p>
          <p>Sana: <strong>${fmtDate(a.slot.startTime)}, ${fmtTime(a.slot.startTime)}</strong></p>
        </div>
        <div style="text-align:right">
          <div id="${timerId}" style="font-size:0.85rem; color:#ef4444; margin-bottom: 8px; font-weight: 500;"></div>
          <button id="${btnId}" class="btn-cancel" onclick="cancelAppt('${a.id}', this)" style="display:none;">Bekor qilish</button>
        </div>
      `;
      c.appendChild(card);

      const bookedAt = new Date(a.createdAt).getTime();
      const slotTime = new Date(a.slot.startTime).getTime();

      function updateTimer() {
        const now = Date.now();
        const minsSince = (now - bookedAt) / 60000;
        const hoursUntil = (slotTime - now) / 3600000;
        
        let canCancel = false;
        let timeText = '';
        
        if (remainingCancellations === 0) {
          timeText = "Markaz bilan bog'laning: +998 90 123 45 67";
        } else if (minsSince <= 15) {
          canCancel = true;
          const timeLeftMs = (bookedAt + 15 * 60000) - now;
          const m = Math.floor(timeLeftMs / 60000);
          const s = Math.floor((timeLeftMs % 60000) / 1000);
          timeText = `Bekor qilish: ${m} daq ${s} soniya`;
        } else {
          timeText = "Vaqt o'tgan (Klinika bilan bog'laning)";
        }

        const timerEl = document.getElementById(timerId);
        const btnEl = document.getElementById(btnId);
        
        if (timerEl) timerEl.textContent = timeText;
        if (btnEl) {
          if (canCancel) {
            btnEl.style.display = 'inline-block';
          } else {
            btnEl.style.display = 'none';
          }
        }
      }
      
      updateTimer();
      activeIntervals.push(setInterval(updateTimer, 1000));
    });
  }

  async function cancelAppt(id, btn) {
    if (!confirm('Haqiqatan ham qabulni bekor qilmoqchimisiz?')) return;
    
    btn.disabled = true;
    btn.textContent = 'Kuting...';
    
    try {
      const res = await fetch(`${API}/api/public/appointments/cancel`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ appointmentId: id, patientId })
      });
      const data = await res.json();
      
      if (res.ok) {
        alert('Qabul bekor qilindi.');
        fetchAppts();
      } else {
        alert(data.error || 'Bekor qilishda xatolik yuz berdi');
        btn.disabled = false;
        btn.textContent = 'Bekor qilish';
      }
    } catch (e) {
      alert('Server xatosi');
      btn.disabled = false;
      btn.textContent = 'Bekor qilish';
    }
  }

  fetchAppts();
</script>
<script src="main.js"></script>
</body>
</html>
