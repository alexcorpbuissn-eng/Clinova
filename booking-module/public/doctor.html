<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shifokor Paneli | Habibullo-Hilola</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    :root {
      --navy: #0f172a; --teal: #0d9488; --teal-dark: #0f766e; --teal-light: #f0fdfa;
      --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0; --text: #334155; --text-muted: #64748b;
      --red: #ef4444; --red-bg: #fef2f2; --green: #16a34a; --green-bg: #dcfce7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100vh; background: var(--navy); }
    .login-card { background: var(--surface); padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { color: var(--navy); font-size: 1.4rem; }
    .login-logo p { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--navy); margin-bottom: 7px; }
    .form-group input { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--teal); }
    .btn-full { display: block; width: 100%; background: var(--teal); color: #fff; padding: 13px 20px; border: none; border-radius: 10px; font-family: inherit; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
    .btn-full:hover { background: var(--teal-dark); }
    .err-msg { color: var(--red); font-size: 0.83rem; margin-bottom: 14px; text-align: center; min-height: 20px; }

    /* App layout */
    #app { display: none; }
    .top-bar { background: var(--navy); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .top-bar-title { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .doctor-selector-wrap { display: none; align-items: center; gap: 10px; margin-left: 20px; }
    .doctor-selector { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 12px; border-radius: 8px; font-family: inherit; font-size: 0.85rem; outline: none; cursor: pointer; }
    .doctor-selector option { background: var(--navy); color: #fff; }
    .top-bar-actions { display: flex; align-items: center; gap: 14px; }
    .top-bar-date { font-size: 0.82rem; color: #94a3b8; }
    .btn-logout { background: none; border: 1px solid #334155; color: #94a3b8; padding: 6px 14px; border-radius: 8px; font-family: inherit; font-size: 0.82rem; cursor: pointer; }
    .btn-logout:hover { border-color: #64748b; color: #fff; }

    .page-body { max-width: 1400px; margin: 0 auto; padding: 30px 20px; display: grid; grid-template-columns: 1fr 380px; gap: 28px; align-items: start; }
    @media(max-width: 1024px) { .page-body { grid-template-columns: 1fr; } }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border-radius: 16px; padding: 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
    .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .stat-info h4 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-info p { font-size: 1.25rem; font-weight: 700; color: var(--navy); }

    /* Weekly Grid */
    .weekly-container { background: var(--surface); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 28px; }
    .weekly-header { display: grid; grid-template-columns: 80px repeat(7, 1fr); background: var(--navy); color: #fff; text-align: center; border-bottom: 1px solid #1e293b; }
    .weekly-header-cell { padding: 15px 5px; border-right: 1px solid #1e293b; }
    .weekly-header-cell:last-child { border-right: none; }
    .weekly-header-cell .day-name { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.7; font-weight: 700; }
    .weekly-header-cell .day-date { font-size: 1.1rem; font-weight: 700; display: block; margin-top: 2px; }
    .weekly-header-cell.today { background: var(--teal); color: #fff; }

    .weekly-grid { display: grid; grid-template-columns: 80px repeat(7, 1fr); max-height: 600px; overflow-y: auto; }
    .time-col { background: #f1f5f9; border-right: 1px solid var(--border); }
    .time-cell { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    
    .day-col { border-right: 1px solid var(--border); position: relative; }
    .day-col:last-child { border-right: none; }
    .grid-cell { height: 50px; border-bottom: 1px solid #f1f5f9; position: relative; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; }
    .grid-cell:hover { background: var(--teal-light); }
    
    .slot-btn { width: 100%; height: 100%; border-radius: 8px; border: 1px dashed var(--border); background: none; transition: all 0.2s; cursor: pointer; font-size: 0.7rem; font-weight: 600; color: var(--text-muted); }
    .slot-btn.active { background: var(--green-bg); border: 1px solid var(--green); color: var(--green); }
    .slot-btn.pending { background: #fef9c3; border: 1px dashed #ca8a04; color: #854d0e; }
    .slot-btn.booked { background: #e0f2fe; border: 1px solid #0284c7; color: #0369a1; cursor: not-allowed; }
    .slot-btn.booked span { display: block; font-size: 0.6rem; opacity: 0.8; }
    .slot-btn.disabled { opacity: 0.4; cursor: not-allowed; background: #f1f5f9; }

    .grid-footer { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid var(--border); }
    .legend { display: flex; gap: 20px; font-size: 0.8rem; color: var(--text-muted); }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

    /* Appointments */
    .visits-card { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    .visits-header { padding: 20px 24px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .visits-header h2 { font-size: 1.05rem; color: var(--navy); }
    .btn-refresh { background: none; border: 1.5px solid var(--border); color: var(--text-muted); padding: 7px 14px; border-radius: 8px; font-family: inherit; font-size: 0.82rem; cursor: pointer; }
    .btn-refresh:hover { border-color: var(--teal); color: var(--teal); }
    
    .appt-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 20px; }
    .appt-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .appt-time { font-size: 1.1rem; font-weight: 700; color: var(--teal-dark); display: flex; align-items: center; gap: 8px; }
    .appt-date { font-size: 0.85rem; color: var(--text-muted); }
    .appt-patient { font-weight: 600; color: var(--navy); font-size: 1.05rem; }
    .appt-phone { color: var(--text-muted); font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.9rem; width: 100%; }

    .btn-submit { background: var(--navy); color: #fff; padding: 10px 24px; border: none; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
    .btn-submit:hover { background: #1e293b; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Modern Premium Toast Notifications */
    #toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      min-width: 320px;
      max-width: 450px;
      background: rgba(15, 23, 42, 0.9); /* Dark navy */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px 20px;
      color: #fff;
      font-weight: 500;
      font-size: 0.9rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(120%);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }
    .toast.success {
      border-left: 4px solid var(--teal);
    }
    .toast.error {
      border-left: 4px solid var(--red);
    }
    .toast.info {
      border-left: 4px solid #3b82f6; /* Blue info color */
    }
    .toast-icon {
      font-size: 1.25rem;
      flex-shrink: 0;
    }
    .toast-content {
      flex: 1;
      line-height: 1.4;
    }
    .toast-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      transition: color 0.2s;
    }
    .toast-close:hover {
      color: #fff;
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>👨‍⚕️ Shifokor Paneli</h1>
      <p>Habibullo-Hilola Klinikasi</p>
    </div>
    <div id="login-err" class="err-msg"></div>

    <form id="phone-form">
      <div class="form-group">
        <label>Telegram raqamingiz</label>
        <input type="tel" id="telegram-phone" required placeholder="+998 90 000 00 00" />
      </div>
      <button type="submit" class="btn-full" id="btn-phone">Kodni Olish</button>
    </form>

    <form id="otp-form" style="display:none;">
      <div class="form-group">
        <label>Tasdiqlash kodi (Telegramdan)</label>
        <input type="text" id="otp-code" required placeholder="123456" maxlength="6" style="font-size:1.5rem; letter-spacing: 0.3em; text-align:center;" />
      </div>
      <button type="submit" class="btn-full" id="btn-otp">Kirish</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar">
    <div class="top-bar-title">
      <span>👨‍⚕️ Shifokor Paneli</span> — <span id="doctor-name" style="margin-left: 5px; color: var(--teal-light);"></span>
      <div id="admin-doc-selector" class="doctor-selector-wrap">
        <label style="font-size:0.75rem; color:#94a3b8;">Boshqarish:</label>
        <select id="doc-select" class="doctor-selector" onchange="switchDoctor(this.value)">
          <option value="">Shifokorni tanlang...</option>
        </select>
      </div>
    </div>
    <div class="top-bar-actions">
      <span class="top-bar-date" id="top-date"></span>
      <button class="btn-logout" onclick="logout()">🚪 Chiqish</button>
    </div>
  </div>

  <div class="page-body">
    <!-- Left: Schedule -->
    <div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon" style="background:#e0f2fe; color:#0284c7;">📅</div>
          <div class="stat-info">
            <h4>Bugungi qabullar</h4>
            <p id="stat-today-count">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#dcfce7; color:#16a34a;">💰</div>
          <div class="stat-info">
            <h4>Kutilayotgan tushum</h4>
            <p id="stat-today-revenue">0 so'm</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#fef2f2; color:#ef4444;">✨</div>
          <div class="stat-info">
            <h4>Haftalik bandlik</h4>
            <p id="stat-week-occupancy">0%</p>
          </div>
        </div>
      </div>

      <div class="weekly-container">
        <!-- Shablon Asboblari (Copy/Paste toolbar) -->
        <div class="schedule-toolbar" style="display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; background:#1e293b; padding:12px 20px; border-bottom:1px solid #334155; color:#fff; font-size:0.85rem; gap:12px;">
          <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <span>📋 <strong>Kunlik jadval shabloni:</strong></span>
            <select id="copy-day-select" style="background:#0f172a; color:#fff; border:1px solid #475569; padding:6px 12px; border-radius:8px; font-family:inherit; font-size:0.8rem; outline:none; cursor:pointer;">
              <option value="">Kunni tanlang...</option>
            </select>
            <button onclick="copySelectedDay()" class="btn-refresh" style="padding:6px 14px; font-size:0.8rem; background:var(--teal); color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:600; display:flex; align-items:center; gap:5px;">📋 Nusxalash</button>
          </div>
          <div id="paste-actions-wrap" style="display:none; align-items:center; gap:10px; flex-wrap:wrap;">
            <span id="copied-status-msg" style="color:#2dd4bf; font-weight:600; font-size:0.8rem; margin-right:5px;"></span>
            <button onclick="applyToAllDays()" class="btn-refresh" style="padding:6px 14px; font-size:0.8rem; background:var(--green); color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:600; display:flex; align-items:center; gap:5px;">🔁 Haftaga qo'llash (Barchaga)</button>
            <button onclick="cancelCopyState()" class="btn-logout" style="padding:6px 12px; font-size:0.8rem; border-color:#475569; color:#94a3b8; border-radius:8px; cursor:pointer; background:none;">Bekor qilish</button>
          </div>
        </div>

        <div class="weekly-header" id="grid-header"></div>
        <div class="weekly-grid">
          <div class="time-col" id="time-labels"></div>
          <div id="grid-columns" style="display:contents;"></div>
        </div>
        <div class="grid-footer">
          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="border:1px dashed var(--border)"></div> Bo'sh</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--green); border:1px solid var(--green)"></div> Ochiq</div>
            <div class="legend-item"><div class="legend-dot" style="background:#ca8a04;"></div> Saqlanmoqda</div>
            <div class="legend-item"><div class="legend-dot" style="background:#0284c7;"></div> Band</div>
          </div>
          <div style="display:flex; gap:12px;">
            <button class="btn-refresh" onclick="loadData()">Yangilash</button>
            <button class="btn-submit" id="btn-save-grid" onclick="saveGridChanges()">Saqlash</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Appointments -->
    <div class="visits-card" style="height:fit-content; position:sticky; top:20px;">
      <div class="visits-header">
        <h2>📅 Kelgusi qabullar</h2>
        <button class="btn-refresh" onclick="loadAppointments()">🔄</button>
      </div>
      <div class="appt-grid" id="appointments-container" style="max-height:800px; overflow-y:auto;">
        <div class="empty-state">Yuklanmoqda...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
  let doctorToken = null;
  let doctorInfo = null;
  let userRole = null;
  let currentDoctorId = null;
  let allSlots = [];
  let pendingChanges = {}; // key: "isoDate_timeStr", value: 'add' | 'remove'
  let copiedSchedule = null;
  let copiedDayLabel = '';

  const START_HOUR = 8;
  const END_HOUR = 19;
  const INTERVAL = 30; // minutes

  // ---- Utility ----
  function getLocalISO(date) {
    return date.toLocaleDateString('en-CA'); // YYYY-MM-DD
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('top-date').textContent = now.toLocaleString('uz-UZ', {
      weekday: 'long', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Tashkent'
    });
  }

  function applyPhoneFormatter(input) {
    input.addEventListener('input', (e) => {
      let val = e.target.value.replace(/\D/g, '');
      if (val.startsWith('998')) val = val.substring(3);
      val = val.substring(0, 9);
      let formatted = '+998 ';
      if (val.length > 0) formatted += val.substring(0, 2) + ' ';
      if (val.length > 2) formatted += val.substring(2, 5) + ' ';
      if (val.length > 5) formatted += val.substring(5, 7) + ' ';
      if (val.length > 7) formatted += val.substring(7, 9);
      e.target.value = formatted.trim();
    });
  }

  // ---- Auth & Init ----
  window.addEventListener('DOMContentLoaded', async () => {
    applyPhoneFormatter(document.getElementById('telegram-phone'));
    const t = localStorage.getItem('doctor_token');
    if (t) {
      try {
        const info = localStorage.getItem('doctor_info');
        const role = localStorage.getItem('user_role');
        if (info && role) {
          doctorToken = t;
          doctorInfo = JSON.parse(info);
          userRole = role;
          currentDoctorId = doctorInfo ? doctorInfo.id : null;
          showApp();
        } else { logout(); }
      } catch { logout(); }
    }
  });

  document.getElementById('phone-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const phone = document.getElementById('telegram-phone').value;
    const errEl = document.getElementById('login-err');
    const btn = document.getElementById('btn-phone');
    if (!/^\+998 \d{2} \d{3} \d{2} \d{2}$/.test(phone)) {
      errEl.textContent = "Iltimos, to'g'ri raqam kiriting.";
      return;
    }
    errEl.textContent = ''; btn.disabled = true;
    try {
      const res = await fetch('/api/public/send-otp', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telegramPhone: phone })
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('phone-form').style.display = 'none';
        document.getElementById('otp-form').style.display = 'block';
      } else { errEl.textContent = data.error || 'Xatolik'; }
    } catch { errEl.textContent = 'Tarmoq xatosi'; }
    btn.disabled = false;
  });

  document.getElementById('otp-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const phone = document.getElementById('telegram-phone').value;
    const code = document.getElementById('otp-code').value;
    const errEl = document.getElementById('login-err');
    const btn = document.getElementById('btn-otp');
    errEl.textContent = ''; btn.disabled = true;
    try {
      const res = await fetch('/api/doctor/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telegramPhone: phone, code })
      });
      const data = await res.json();
      if (res.ok && data.success) {
        doctorToken = data.token;
        doctorInfo = data.doctor;
        userRole = data.role;
        currentDoctorId = data.doctor ? data.doctor.id : null;
        localStorage.setItem('doctor_token', data.token);
        localStorage.setItem('doctor_info', JSON.stringify(data.doctor));
        localStorage.setItem('user_role', data.role);
        showApp();
      } else { errEl.textContent = data.error || 'Kod noto\'g\'ri'; }
    } catch { errEl.textContent = 'Tarmoq xatosi'; }
    btn.disabled = false;
  });

  function logout() {
    localStorage.clear();
    location.reload();
  }

  async function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    
    if (userRole === 'ADMIN') {
      document.getElementById('admin-doc-selector').style.display = 'flex';
      await loadAllDoctorsForAdmin();
    }

    if (doctorInfo) {
      document.getElementById('doctor-name').textContent = `${doctorInfo.firstName} ${doctorInfo.lastName}`;
    } else {
      document.getElementById('doctor-name').textContent = "Admin (Tanlang)";
    }
    
    updateClock();
    setInterval(updateClock, 30000);
    loadData();
  }

  async function loadAllDoctorsForAdmin() {
    try {
      const res = await fetch('/api/public/doctors');
      const data = await res.json();
      if (data.success) {
        const select = document.getElementById('doc-select');
        select.innerHTML = '<option value="">Shifokorni tanlang...</option>' + 
          data.doctors.map(d => `<option value="${d.id}" ${currentDoctorId === d.id ? 'selected' : ''}>${d.firstName} ${d.lastName}</option>`).join('');
      }
    } catch {}
  }

  function switchDoctor(id) {
    if (!id) return;
    currentDoctorId = id;
    const select = document.getElementById('doc-select');
    document.getElementById('doctor-name').textContent = select.options[select.selectedIndex].text;
    pendingChanges = {};
    if (typeof cancelCopyState === 'function') cancelCopyState();
    loadData();
  }

  function loadData() {
    loadGrid();
    loadAppointments();
  }

  // ---- Grid Logic ----
  async function loadGrid() {
    if (!currentDoctorId) {
      allSlots = [];
      renderGrid();
      updateStats();
      return;
    }
    try {
      const res = await fetch(`/api/doctor/slots?doctorId=${currentDoctorId}`, { headers: { 'Authorization': `Bearer ${doctorToken}` } });
      const data = await res.json();
      if (res.ok && data.success) {
        allSlots = data.slots;
        renderGrid();
        updateStats();
      }
    } catch (e) { console.error(e); }
  }

  function getLocalTimeStr(date) {
    return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
  }

  function renderGrid() {
    const header = document.getElementById('grid-header');
    const labels = document.getElementById('time-labels');
    const columns = document.getElementById('grid-columns');
    
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date();
      d.setDate(d.getDate() + i);
      days.push(d);
    }

    // Update copy dropdown dynamically
    const copySelect = document.getElementById('copy-day-select');
    if (copySelect) {
      const prevVal = copySelect.value;
      copySelect.innerHTML = '<option value="">Kunni tanlang...</option>' + 
        days.map(d => {
          const iso = getLocalISO(d);
          const name = d.toLocaleDateString('uz-UZ', { weekday: 'long' });
          const dateStr = d.getDate();
          const monthStr = d.toLocaleDateString('uz-UZ', { month: 'short' });
          return `<option value="${iso}">${name} (${dateStr} ${monthStr})</option>`;
        }).join('');
      if (prevVal) copySelect.value = prevVal;
    }

    header.innerHTML = '<div class="weekly-header-cell" style="width:80px"></div>' + 
      days.map(d => {
        const iso = getLocalISO(d);
        const isToday = iso === getLocalISO(new Date());
        
        // Show paste button in the header cell if a schedule is copied and this is NOT the copied day itself
        const sourceIso = copySelect ? copySelect.value : '';
        const showPaste = (typeof copiedSchedule !== 'undefined' && copiedSchedule !== null) && iso !== sourceIso;
        const pasteBtn = showPaste ? `
          <button onclick="pasteToDay('${iso}', event)" title="Nusxalangan jadvalni shu kunga joylash" style="background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.3); padding:2px 6px; border-radius:6px; font-size:0.65rem; margin-top:5px; cursor:pointer; display:inline-block; transition:all 0.2s;" onmouseover="this.style.background='var(--teal)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'">📥 Joylash</button>
        ` : '';

        return `
          <div class="weekly-header-cell ${isToday ? 'today' : ''}" style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80px;">
            <span class="day-name">${d.toLocaleDateString('uz-UZ', { weekday: 'short' })}</span>
            <span class="day-date" style="font-size:1.1rem; font-weight:700; margin-top:2px;">${d.getDate()}</span>
            ${pasteBtn}
          </div>
        `;
      }).join('');

    const times = [];
    for (let h = START_HOUR; h <= END_HOUR; h++) {
      for (let m = 0; m < 60; m += INTERVAL) {
        const t = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        times.push(t);
      }
    }
    labels.innerHTML = times.map(t => `<div class="time-cell">${t}</div>`).join('');

    columns.innerHTML = days.map(d => {
      const iso = getLocalISO(d);
      return `
        <div class="day-col">
          ${times.map(t => {
            const key = `${iso}_${t}`;
            
            // Check if past
            const [h, m] = t.split(':');
            const slotDateTime = new Date(d.getFullYear(), d.getMonth(), d.getDate(), Number(h), Number(m));
            const isPast = slotDateTime < new Date();

            const existing = allSlots.find(s => {
              const sStart = new Date(s.startTime);
              const sEnd = new Date(sStart.getTime() + s.duration * 60000);
              return slotDateTime >= sStart && slotDateTime < sEnd;
            });
            
            let statusClass = '';
            let label = '';
            const isBooked = existing && existing.appointment && existing.appointment.status !== 'CANCELLED';
            if (existing) {
              statusClass = isBooked ? 'booked' : 'active';
              if (isBooked) label = '<span>Band</span>';
            }
            
            if (pendingChanges[key] === 'add') statusClass = 'pending';
            if (pendingChanges[key] === 'remove') statusClass = '';
            
            if (isPast && !existing) {
              statusClass += ' disabled';
            }

            const onClickAttr = isPast ? '' : `onclick="toggleSlot('${iso}', '${t}', '${existing ? existing.id : ''}', ${isBooked ? 'true' : 'false'})"`;

            return `
              <div class="grid-cell" ${onClickAttr}>
                <button class="slot-btn ${statusClass}">${label}</button>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }).join('');
  }

  function toggleSlot(iso, time, existingId, isBooked) {
    if (!currentDoctorId) {
      showToast("Iltimos, avval boshqarish uchun shifokorni tanlang!", "error");
      return;
    }
    if (isBooked) return;
    const key = `${iso}_${time}`;
    const action = pendingChanges[key];

    const existing = allSlots.find(s => {
      const sStart = new Date(s.startTime);
      const sEnd = new Date(sStart.getTime() + s.duration * 60000);
      const [h, m] = time.split(':');
      const [yr, mo, dy] = iso.split('-');
      const slotDateTime = new Date(yr, mo - 1, dy, h, m);
      return slotDateTime >= sStart && slotDateTime < sEnd;
    });

    if (existing) {
      if (action === 'remove') delete pendingChanges[key];
      else pendingChanges[key] = 'remove';
    } else {
      if (action === 'add') delete pendingChanges[key];
      else pendingChanges[key] = 'add';
    }
    renderGrid();
  }

  async function saveGridChanges() {
    const btn = document.getElementById('btn-save-grid');
    const toCreate = [];
    const toDelete = [];

    for (const [key, action] of Object.entries(pendingChanges)) {
      const [iso, time] = key.split('_');
      const [h, m] = time.split(':');
      const [yr, mo, dy] = iso.split('-');
      const dt = new Date(yr, mo - 1, dy, h, m);
      
      if (action === 'add') {
        toCreate.push({ startTime: dt.toISOString(), duration: INTERVAL });
      } else if (action === 'remove') {
        const existing = allSlots.find(s => {
          const sStart = new Date(s.startTime);
          const sEnd = new Date(sStart.getTime() + s.duration * 60000);
          return dt >= sStart && dt < sEnd;
        });
        if (existing && !toDelete.includes(existing.id)) toDelete.push(existing.id);
      }
    }

    // Har bir 30 daqiqalik vaqt alohida va mustaqil slot sifatida saqlanadi!
    const mergedCreate = toCreate;

    if (!mergedCreate.length && !toDelete.length) return;
    btn.disabled = true; btn.textContent = 'Saqlanmoqda...';

    try {
      for (const id of toDelete) {
        await fetch('/api/doctor/slots', {
          method: 'DELETE', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${doctorToken}` },
          body: JSON.stringify({ slotId: id, doctorId: currentDoctorId })
        });
      }
      if (mergedCreate.length) {
        await fetch('/api/doctor/slots', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${doctorToken}` },
          body: JSON.stringify({ doctorId: currentDoctorId, slots: mergedCreate })
        });
      }
      pendingChanges = {};
      await loadGrid();
      showToast("Muvaffaqiyatli saqlandi!", "success");
    } catch (e) { showToast("Xatolik yuz berdi", "error"); }
    btn.disabled = false; btn.textContent = 'Saqlash';
  }

  // ---- Appointments ----
  async function loadAppointments() {
    const container = document.getElementById('appointments-container');
    if (!currentDoctorId) {
      container.innerHTML = '<div class="empty-state">Shifokorni tanlang...</div>';
      return;
    }
    container.innerHTML = '<div class="empty-state">Yuklanmoqda...</div>';
    try {
      const res = await fetch(`/api/doctor/appointments?doctorId=${currentDoctorId}`, { headers: { 'Authorization': `Bearer ${doctorToken}` } });
      const data = await res.json();
      if (res.ok && data.success) {
        if (data.appointments.length === 0) {
          container.innerHTML = '<div class="empty-state">Kelgusi qabullar yo\'q</div>';
          return;
        }
        container.innerHTML = data.appointments.map(a => {
          const st = new Date(a.slot.startTime);
          const _uzMonths = ['Yan', 'Fev', 'Mar', 'Apr', 'May', 'Iyun', 'Iyul', 'Avg', 'Sen', 'Okt', 'Noy', 'Dek'];
          const dateStr = `${st.getDate()} ${_uzMonths[st.getMonth()]}`;
          const timeStr = st.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Tashkent' });
          const pName = a.patient ? `${a.patient.firstName} ${a.patient.lastName}` : 'Noma\'lum';
          return `
            <div class="appt-card">
              <div class="appt-time">🕒 ${timeStr}</div>
              <div class="appt-date">${dateStr}</div>
              <div class="appt-patient">${pName}</div>
              <div class="appt-phone">📱 ${a.patient ? a.patient.phone : '-'}</div>
            </div>
          `;
        }).join('');
      }
    } catch {}
  }

  function updateStats() {
    const today = getLocalISO(new Date());
    const todayAppts = allSlots.filter(s => getLocalISO(new Date(s.startTime)) === today && s.appointment);
    document.getElementById('stat-today-count').textContent = todayAppts.length;
    document.getElementById('stat-today-revenue').textContent = (todayAppts.length * 200000).toLocaleString() + " so'm";
    const weekTotal = allSlots.length;
    const weekBooked = allSlots.filter(s => s.appointment).length;
    const occupancy = weekTotal > 0 ? Math.round((weekBooked / weekTotal) * 100) : 0;
    document.getElementById('stat-week-occupancy').textContent = occupancy + "%";
  }

  // ---- Copy/Paste Schedule Shablon ----
  function copySelectedDay() {
    const isoDate = document.getElementById('copy-day-select').value;
    if (!isoDate) {
      showToast("Iltimos, nusxalash uchun kunni tanlang!", "error");
      return;
    }

    const select = document.getElementById('copy-day-select');
    copiedDayLabel = select.options[select.selectedIndex].text;

    // Collect all open slots (existing in database OR pending additions, minus pending removals)
    const times = [];
    for (let h = START_HOUR; h <= END_HOUR; h++) {
      for (let m = 0; m < 60; m += INTERVAL) {
        const t = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        times.push(t);
      }
    }

    copiedSchedule = [];
    for (const t of times) {
      const key = `${isoDate}_${t}`;
      const [h_str, m_str] = t.split(':');
      const slotDateTime = new Date(
        Number(isoDate.split('-')[0]),
        Number(isoDate.split('-')[1]) - 1,
        Number(isoDate.split('-')[2]),
        Number(h_str),
        Number(m_str)
      );

      const existing = allSlots.find(s => {
        const sStart = new Date(s.startTime);
        const sEnd = new Date(sStart.getTime() + s.duration * 60000);
        return slotDateTime >= sStart && slotDateTime < sEnd;
      });

      const action = pendingChanges[key];
      let isOpen = false;

      if (existing) {
        if (action !== 'remove' && !existing.appointment) isOpen = true;
      } else {
        if (action === 'add') isOpen = true;
      }

      if (isOpen) {
        copiedSchedule.push(t);
      }
    }

    // Show paste actions
    document.getElementById('copied-status-msg').textContent = `📋 ${copiedDayLabel} nusxalandi (${copiedSchedule.length} ta ochiq soat)`;
    document.getElementById('paste-actions-wrap').style.display = 'flex';
    renderGrid();
  }

  function applyToAllDays() {
    if (!copiedSchedule) return;
    
    // Find all days in the grid
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date();
      d.setDate(d.getDate() + i);
      days.push(d);
    }

    const times = [];
    for (let h = START_HOUR; h <= END_HOUR; h++) {
      for (let m = 0; m < 60; m += INTERVAL) {
        const t = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        times.push(t);
      }
    }

    const sourceIso = document.getElementById('copy-day-select').value;

    for (const d of days) {
      const iso = getLocalISO(d);
      if (iso === sourceIso) continue;

      for (const t of times) {
        const key = `${iso}_${t}`;
        const [h_str, m_str] = t.split(':');
        const slotDateTime = new Date(d.getFullYear(), d.getMonth(), d.getDate(), Number(h_str), Number(m_str));
        
        if (slotDateTime < new Date()) continue;

        const existing = allSlots.find(s => {
          const sStart = new Date(s.startTime);
          const sEnd = new Date(sStart.getTime() + s.duration * 60000);
          return slotDateTime >= sStart && slotDateTime < sEnd;
        });

        if (existing && existing.appointment) continue;

        const shouldBeOpen = copiedSchedule.includes(t);

        if (shouldBeOpen) {
          if (existing) {
            if (pendingChanges[key] === 'remove') delete pendingChanges[key];
          } else {
            pendingChanges[key] = 'add';
          }
        } else {
          if (existing) {
            pendingChanges[key] = 'remove';
          } else {
            if (pendingChanges[key] === 'add') delete pendingChanges[key];
          }
        }
      }
    }

    renderGrid();
    showToast("Nusxalangan shablon haftadagi barcha kunlarga qo'llandi! Tasdiqlash uchun pastdagi 'Saqlash' tugmasini bosing.", "info");
  }

  function pasteToDay(targetIso, event) {
    if (event) event.stopPropagation();
    if (!copiedSchedule) return;

    const times = [];
    for (let h = START_HOUR; h <= END_HOUR; h++) {
      for (let m = 0; m < 60; m += INTERVAL) {
        const t = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        times.push(t);
      }
    }

    const [yr, mo, dy] = targetIso.split('-');

    for (const t of times) {
      const key = `${targetIso}_${t}`;
      const [h_str, m_str] = t.split(':');
      const slotDateTime = new Date(Number(yr), Number(mo) - 1, Number(dy), Number(h_str), Number(m_str));
      
      if (slotDateTime < new Date()) continue;

      const existing = allSlots.find(s => {
        const sStart = new Date(s.startTime);
        const sEnd = new Date(sStart.getTime() + s.duration * 60000);
        return slotDateTime >= sStart && slotDateTime < sEnd;
      });

      if (existing && existing.appointment) continue;

      const shouldBeOpen = copiedSchedule.includes(t);

      if (shouldBeOpen) {
        if (existing) {
          if (pendingChanges[key] === 'remove') delete pendingChanges[key];
        } else {
          pendingChanges[key] = 'add';
        }
      } else {
        if (existing) {
          pendingChanges[key] = 'remove';
        } else {
          if (pendingChanges[key] === 'add') delete pendingChanges[key];
        }
      }
    }

    renderGrid();
  }

  function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    let icon = '✨';
    if (type === 'success') icon = '✅';
    else if (type === 'error') icon = '❌';
    else if (type === 'info') icon = 'ℹ️';

    toast.innerHTML = `
      <div class="toast-icon">${icon}</div>
      <div class="toast-content">${message}</div>
      <button class="toast-close" onclick="this.parentElement.remove()">×</button>
    `;

    container.appendChild(toast);

    // Trigger animation
    setTimeout(() => toast.classList.add('show'), 10);

    // Auto dismiss
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 400);
    }, 4000);
  }

  function cancelCopyState() {
    copiedSchedule = null;
    copiedDayLabel = '';
    const select = document.getElementById('copy-day-select');
    if (select) select.value = '';
    const wrap = document.getElementById('paste-actions-wrap');
    if (wrap) wrap.style.display = 'none';
    renderGrid();
  }
</script>
<div id="toast-container"></div>
